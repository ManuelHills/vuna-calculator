# nginx.conf — served as /etc/nginx/conf.d/default.conf inside the container

server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # ── Health check endpoint ─────────────────────────────────
    # GitHub Actions Job 6 will curl this to verify deployment
    location /health {
        access_log  off;
        return      200 'ok';
        add_header  Content-Type text/plain;
    }

    # ── Main app ──────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache CSS and JS for 1 day ────────────────────────────
    location ~* \.(css|js)$ {
        expires             1d;
        add_header          Cache-Control "public, immutable";
    }

    # ── Gzip compression ──────────────────────────────────────
    gzip            on;
    gzip_types      text/plain text/css application/javascript text/html;
    gzip_min_length 256;
}
