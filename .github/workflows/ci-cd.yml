name: CI/CD Pipeline — VUNA Calculator

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  # ── JOB 1: Run Tests ────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci

  # ── JOB 2: Build & Push Docker Image ────────────────────────
  docker-build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/vuna-calculator:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/vuna-calculator:${{ github.sha }}

  # ── JOB 3: Deploy to VPS via SCP (password login) ───────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [docker-build-and-push]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port:     ${{ secrets.SERVER_PORT }}
          source:   "index.html,assets/css/styles.css,assets/js/script.js"
          target:   "/home/oke.vudse26.cloud/public_html"

      - name: Confirm deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port:     ${{ secrets.SERVER_PORT }}
          script: |
            echo "=== Deployment successful! ==="
            ls /home/oke.vudse26.cloud/public_html/
