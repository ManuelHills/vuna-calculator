# ================================================================
# .github/workflows/ci-cd.yml
# This is your CI/CD Pipeline.
#
# What it does automatically every time you push to GitHub:
#   1. Runs your tests to make sure nothing is broken
#   2. Builds a Docker image of your calculator
#   3. Pushes that image to Docker Hub
#   4. SSH into your VPS and deploys the new version live
#
# Your lecturer will see this file in your GitHub repo.
# ================================================================

name: CI/CD Pipeline — VUNA Calculator

# WHEN does this pipeline run?
on:
  push:
    branches: [ main ]       # Runs when you push to the main branch
  workflow_dispatch:          # Also allows manual run from GitHub Actions UI

jobs:

  # ============================================================
  # JOB 1: Run Tests
  # Makes sure your app works before we deploy it
  # ============================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest    # GitHub provides a free Ubuntu machine to run this

    steps:
      # Step 1: Download your code onto the GitHub runner machine
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Node.js
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'        # Cache packages — makes future runs faster

      # Step 3: Install project dependencies (express, jest, supertest)
      - name: Install dependencies
        run: npm ci

      # Step 4: Run your test files (tests/app.test.js)
      - name: Run tests
        run: npm run test:ci

  # ============================================================
  # JOB 2: Build Docker Image & Push to Docker Hub
  # Only runs AFTER tests pass (needs: [test])
  # ============================================================
  docker-build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test]             # Wait for tests to pass first!

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Log in to Docker Hub using your secrets
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build your Dockerfile and push the image to Docker Hub
      # It gets tagged with both "latest" and the commit SHA
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/vuna-calculator:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/vuna-calculator:${{ github.sha }}

  # ============================================================
  # JOB 3: Deploy to Your VPS
  # SSH into your server and run the new Docker container
  # Only runs AFTER Docker image is pushed successfully
  # ============================================================
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [docker-build-and-push]

    steps:
      - name: Deploy via SSH to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          port:     ${{ secrets.SERVER_PORT }}
          script: |
            echo "=== Pulling latest Docker image ==="
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/vuna-calculator:latest

            echo "=== Stopping old container (if running) ==="
            docker stop vuna-calculator 2>/dev/null || echo "No old container to stop"
            docker rm   vuna-calculator 2>/dev/null || echo "No old container to remove"

            echo "=== Starting new container ==="
            docker run -d \
              --name vuna-calculator \
              --restart unless-stopped \
              -p 3000:3000 \
              ${{ secrets.DOCKERHUB_USERNAME }}/vuna-calculator:latest

            echo "=== Waiting for app to start ==="
            sleep 8

            echo "=== Health check ==="
            curl -sf http://localhost:3000/health && echo "✅ App is healthy!" || echo "❌ Health check failed"

            echo "=== Cleaning up old Docker images ==="
            docker image prune -f

            echo "=== Deployment complete! ==="
